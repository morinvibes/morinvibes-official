<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MorinVibes | Premium Moringa Capsules</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<nav>
    <div class="logo">
        <img src="assets/logo.png" alt="MorinVibes Logo">
    </div>

    <div class="menu">
        <a data-translate="nav_home">Home</a>
        <a data-translate="nav_benefits">Benefits</a>
        <a data-translate="nav_science">Science</a>
        <a data-translate="nav_reviews">Reviews</a>
        <a data-translate="nav_faq">FAQ</a>
    </div>

    <div class="lang-switch">
        <select onchange="setLanguage(this.value)">
            <option value="en" selected>English</option>
            <option value="bm">Bahasa Melayu</option>
            <option value="zh-cn">简体中文</option>
            <option value="zh-tw">繁體中文</option>
        </select>
    </div>

    <a href="#order" class="cta-btn" data-translate="nav_order">Order Now</a>
</nav>

<header class="hero">
    <h1 class="typing"></h1>
    <p data-translate="hero_desc">Premium Moringa Capsules for Wellness</p>
    <a href="#order" class="main-btn" data-translate="hero_btn">Shop Now</a>
</header>

<section class="stats">
    <div>
        <h2 class="counter" data-target="10000">0</h2>
        <p data-translate="stat_customers">Happy Customers</p>
    </div>
    <div>
        <h2 class="counter" data-target="98">0</h2>
        <p data-translate="stat_satisfaction">Satisfaction Rate</p>
    </div>
</section>

<section id="order" class="order">
    <h2 data-translate="order_title">Place Your Order</h2>
    <!-- Paste Orderla embed here -->
</section>

<footer>
    © 2026 MorinVibes | Made in Penang, Malaysia
</footer>

<script src="js/main.js"></script>
</body>
</html>
