  <script>
    try {
      var lang = localStorage.getItem('mv_lang') || 'en';
      if (['en','bm','zh'].indexOf(lang) === -1) lang = 'en';
      // GitHub Pages path - redirect to language subfolder
      window.location.replace(lang + '/index.html');

      window.location.replace('en/index.html');

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'DM Sans', sans-serif;
      background: #f7fefe;
      color: #1c2e2c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .loader {
      text-align: center;
      max-width: 400px;
    }
    .loader p {
      margin-bottom: 20px;
      font-size: 16px;
      color: #4a6b68;
    }
    .spinner {
      width: 50px;
      height: 50px;
      margin: 20px auto;
      border: 3px solid #e5eded;
      border-top-color: #0097b2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader a {
      color: #0097b2;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .loader a:hover { border-bottom-color: #0097b2; }
  </style>
