<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MorinVibes | Premium Moringa Capsules</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<nav>
    <div class="logo">
        <img src="assets/logo.png">
    </div>

    <div class="menu">
        <a data-translate="nav_home">Home</a>
        <a data-translate="nav_benefits">Benefits</a>
        <a data-translate="nav_science">Science</a>
        <a data-translate="nav_reviews">Reviews</a>
        <a data-translate="nav_faq">FAQ</a>
    </div>

    <div class="lang-switch">
        <button onclick="setLanguage('en')">EN</button>
        <button onclick="setLanguage('bm')">BM</button>
        <button onclick="setLanguage('zh-cn')">简</button>
        <button onclick="setLanguage('zh-tw')">繁</button>
    </div>

    <a href="#order" class="cta-btn" data-translate="nav_order">Order Now</a>
</nav>

<header class="hero">
    <h1 class="typing"></h1>
    <p data-translate="hero_desc"></p>
    <a href="#order" class="main-btn" data-translate="hero_btn"></a>
</header>

<section class="stats">
    <div>
        <h2 class="counter" data-target="10000">0</h2>
        <p data-translate="stat_customers"></p>
    </div>
    <div>
        <h2 class="counter" data-target="98">0</h2>
        <p data-translate="stat_satisfaction"></p>
    </div>
</section>

<section id="order" class="order">
    <h2 data-translate="order_title"></h2>
    <!-- Paste Orderla embed here -->
</section>

<footer>
    © 2026 MorinVibes
</footer>

<script src="js/main.js"></script>
</body>
</html>
